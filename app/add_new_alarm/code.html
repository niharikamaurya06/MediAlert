<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Alarm - Digital Caretaker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e1e2e4",
                    "secondary-container": "#c0d5ff",
                    "on-primary-container": "#cadcff",
                    "on-tertiary-fixed": "#341100",
                    "surface-container-high": "#e7e8ea",
                    "on-secondary-fixed-variant": "#324769",
                    "primary-container": "#005fb8",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "primary": "#00488d",
                    "inverse-on-surface": "#f0f1f3",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#d6e3ff",
                    "tertiary-fixed-dim": "#ffb691",
                    "on-primary": "#ffffff",
                    "on-primary-fixed-variant": "#00468b",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#783100",
                    "primary-fixed": "#d6e3ff",
                    "primary-fixed-dim": "#a8c8ff",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#c2c6d4",
                    "surface": "#f8f9fb",
                    "on-secondary-fixed": "#011b3c",
                    "surface-tint": "#005db5",
                    "on-surface-variant": "#424752",
                    "on-secondary-container": "#475c7f",
                    "secondary": "#4a5f83",
                    "inverse-primary": "#a8c8ff",
                    "outline": "#727783",
                    "secondary-fixed-dim": "#b2c7f0",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#a04401",
                    "inverse-surface": "#2e3132",
                    "on-background": "#191c1e",
                    "surface-container-low": "#f2f4f6",
                    "background": "#f8f9fb",
                    "surface-container-highest": "#e1e2e4",
                    "surface-container": "#edeef0",
                    "tertiary-fixed": "#ffdbcb",
                    "surface-dim": "#d9dadc",
                    "on-primary-fixed": "#001b3d",
                    "tertiary": "#7b3200",
                    "surface-bright": "#f8f9fb",
                    "on-surface": "#191c1e",
                    "on-tertiary-container": "#ffd1bc"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1rem",
                    "xl": "1.25rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .time-picker-gradient {
            background: linear-gradient(180deg, rgba(248, 249, 251, 1) 0%, rgba(248, 249, 251, 0) 50%, rgba(248, 249, 251, 1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-fixed flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="text-lg font-headline font-bold text-blue-900 tracking-tight">Add Alarm</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="flex-1 mt-20 mb-28 px-6 max-w-2xl mx-auto w-full">
<!-- Editorial Headline -->
<section class="mb-10">
<h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight leading-tight">
                New Dosage <br/>Reminder
            </h2>
<p class="text-on-surface-variant mt-2 font-medium">Precision tracking for your health.</p>
</section>
<!-- Time Picker Section -->
<section class="mb-8 p-8 bg-surface-container-low rounded-xl relative overflow-hidden">
<div class="flex justify-between items-center mb-6">
<span class="text-xs font-bold uppercase tracking-widest text-primary">Schedule Time</span>
<span class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full text-xs font-bold">24H FORMAT</span>
</div>
<div class="flex items-center justify-center gap-4 relative">
<!-- Hours Column -->
<div class="flex flex-col items-center">
<span class="text-slate-400 font-headline text-2xl opacity-40">07</span>
<span class="text-primary font-headline text-6xl font-extrabold py-2">08</span>
<span class="text-slate-400 font-headline text-2xl opacity-40">09</span>
</div>
<span class="text-primary font-headline text-5xl font-bold mb-1">:</span>
<!-- Minutes Column -->
<div class="flex flex-col items-center">
<span class="text-slate-400 font-headline text-2xl opacity-40">15</span>
<span class="text-primary font-headline text-6xl font-extrabold py-2">30</span>
<span class="text-slate-400 font-headline text-2xl opacity-40">45</span>
</div>
</div>
<div class="mt-8 flex justify-center gap-2">
<div class="px-4 py-2 bg-surface-container-lowest text-primary font-bold rounded-lg text-sm transition-all active:scale-95">AM</div>
<div class="px-4 py-2 bg-primary text-on-primary font-bold rounded-lg text-sm shadow-lg shadow-primary/20 transition-all active:scale-95">PM</div>
</div>
</section>
<!-- Input Fields - Bento Inspired -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Medicine Name Field -->
<div class="col-span-1 md:col-span-2">
<label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Medicine Name</label>
<div class="group relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-4 text-on-surface placeholder:text-slate-300 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-lg" placeholder="e.g. Lisinopril 10mg" type="text"/>
<div class="absolute right-4 top-4 text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="pill">pill</span>
</div>
</div>
</div>
<!-- Frequency Chips -->
<div class="col-span-1 md:col-span-2 py-4">
<label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-3 ml-1">Repeat</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-semibold active:scale-95 transition-all">Daily</button>
<button class="px-4 py-2 rounded-full bg-primary-container text-white text-sm font-semibold active:scale-95 transition-all">Weekly</button>
<button class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-semibold active:scale-95 transition-all">Custom</button>
</div>
</div>
<!-- Notes Field -->
<div class="col-span-1 md:col-span-2">
<label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Notes</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-lg p-4 text-on-surface placeholder:text-slate-300 focus:ring-2 focus:ring-primary/20 transition-all font-medium resize-none" placeholder="Take with food, avoid caffeine..." rows="3"></textarea>
</div>
</div>
<!-- Notification Setting Card -->
<div class="mt-8 p-5 bg-white rounded-xl flex items-center justify-between border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-secondary-fixed/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
<div>
<h4 class="font-bold text-sm text-on-surface">Critical Alert</h4>
<p class="text-xs text-on-surface-variant">Override silent mode for this dose</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>
</main>
<!-- Fixed Action Footer -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface/90 backdrop-blur-md">
<button class="w-full max-w-2xl mx-auto block py-4 text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 bg-primary">
<span class="material-symbols-outlined" data-icon="save">save</span>
            Save Alarm
        </button>
</div>
<!-- Hidden Navigation Shell Logic - Not rendered for focus task -->
</body></html>
